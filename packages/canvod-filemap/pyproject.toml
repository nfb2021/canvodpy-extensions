[project]
name = "canvod-filemap"
version = "0.3.0"
description = "Canonical GNSS-T filename parser and data directory validator"
readme = "README.md"
requires-python = ">=3.14"

dependencies = [
    "pydantic>=2.5.0",
    "pyyaml>=6.0",
    "duckdb>=1.0",
    "natsort>=8.4.0",
]

[project.urls]
Homepage = "https://github.com/nfb2021/canvodpy"
Documentation = "https://nfb2021.github.io/canvodpy/packages/naming/overview/"
Repository = "https://github.com/nfb2021/canvodpy"
Issues = "https://github.com/nfb2021/canvodpy/issues"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "canvod.filemap"
