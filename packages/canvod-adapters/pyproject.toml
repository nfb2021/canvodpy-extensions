[project]
name = "canvod-adapters"
version = "0.1.0"
description = "Bidirectional data adapters between canvodpy and third-party GNSS-VOD tools"
readme = "README.md"
requires-python = ">=3.14"

dependencies = [
    "xarray>=2024.1.0",
    "numpy>=1.26.0",
    "pandas>=2.0.0",
    "h5netcdf>=1.3.0",
    "h5py>=3.10.0",
]

[project.optional-dependencies]
store = ["canvod-store>=0.2.3"]

[project.urls]
Homepage = "https://github.com/nfb2021/canvodpy-extensions"
Documentation = "https://nfb2021.github.io/canvodpy-extensions/packages/adapters/overview/"
Repository = "https://github.com/nfb2021/canvodpy-extensions"
Issues = "https://github.com/nfb2021/canvodpy-extensions/issues"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "canvod.adapters"
