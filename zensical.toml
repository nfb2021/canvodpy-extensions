# ==========================================================================
# canvodpy-extensions Documentation - Zensical Configuration
# ==========================================================================
#
# Documentation site for the canvodpy-extensions monorepo.
# Serve locally with: just docs
# Build with:         just docs-build
#
# Root-level files (CONTRIBUTING.md) are copied into docs/ so zensical can
# serve them from the default docs_dir. Keep them in sync:
#   cp CONTRIBUTING.md docs/
#
# ==========================================================================

[project]
site_name = "canvodpy-extensions"
site_description = "Optional extension packages for the canVODpy ecosystem"
site_author = "Nicolas Bader"
site_url = "https://nfb2021.github.io/canvodpy-extensions/"
copyright = "Copyright &copy; 2026 Nicolas François Bader, TU Wien. This documentation is provided &ldquo;as is&rdquo; without warranty of any kind, express or implied, including but not limited to warranties of correctness, completeness, or fitness for a particular purpose."

repo_url = "https://github.com/nfb2021/canvodpy-extensions"
repo_name = "nfb2021/canvodpy-extensions"
edit_uri = "edit/main/docs/"

extra_css = ["assets/canvod-nordic.css"]
extra_javascript = [
  "assets/mermaid-init.js",
  "assets/mathjax-init.js",
  "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js",
]

# --------------------------------------------------------------------------
# Navigation
# --------------------------------------------------------------------------
# Paths are relative to docs_dir (default: "docs/").
nav = [
  { "Home" = "index.md" },

  { "Packages" = [
    { "canvod-filemap" = [
      { "Overview" = "packages/filemap/overview.md" },
    ]},
    { "canvod-airflow" = [
      { "Overview" = "packages/airflow/overview.md" },
    ]},
    { "canvod-adapters" = [
      { "Overview" = "packages/adapters/overview.md" },
    ]},
  ]},

  { "Development" = [
    { "Contributing" = "CONTRIBUTING.md" },
    { "Security Policy" = "../SECURITY.md" },
  ]},

  { "API Reference" = [
    { "canvod.filemap" = "api/canvod-filemap.md" },
    { "canvod.airflow" = "api/canvod-airflow.md" },
    { "canvod.adapters" = "api/canvod-adapters.md" },
  ]},
]

# --------------------------------------------------------------------------
# Plugins
# --------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_bases = true
members_order = "source"

# --------------------------------------------------------------------------
# Markdown extensions
# --------------------------------------------------------------------------
# When customising ANY extension, ALL desired extensions must be listed
# because zensical replaces defaults rather than merging.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["docs/includes/abbreviations.md"]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# --------------------------------------------------------------------------
# Theme
# --------------------------------------------------------------------------
[project.theme]
language = "en"
custom_dir = "docs/overrides"

features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tooltips",
  "content.tabs.link",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# --------------------------------------------------------------------------
# Social links (footer)
# --------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/nfb2021/canvodpy-extensions"
