name: Publish to PyPI

# Trigger only on production release tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # e.g., v0.1.0, v1.2.3
      # Excludes pre-release tags (beta, alpha, rc)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # GitHub environment for protection rules

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build all packages
        run: |
          rm -rf dist/
          mkdir -p dist/

          # Build every package under packages/*, collecting output into root dist/
          for pkg_dir in packages/*/; do
            name="$(basename "$pkg_dir")"
            if [ -f "${pkg_dir}pyproject.toml" ]; then
              echo "Building $name..."
              uv build --package "$name" --out-dir dist/
            fi
          done

          echo "Built packages:"
          ls -lh dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          skip_existing: true
