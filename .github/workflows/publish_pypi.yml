name: Publish to PyPI

# Trigger only on production release tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # e.g., v0.1.0, v1.2.3
      # Excludes pre-release tags (beta, alpha, rc)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # GitHub environment for protection rules

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build all packages
        run: |
          rm -rf dist/
          mkdir -p dist/

          # Build every package under packages/*, collecting output into root dist/
          for pkg_dir in packages/*/; do
            name="$(basename "$pkg_dir")"
            if [ -f "${pkg_dir}pyproject.toml" ]; then
              echo "Building $name..."
              uv build --package "$name" --out-dir dist/
            fi
          done

          echo "Built packages:"
          ls -lh dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          skip_existing: true
