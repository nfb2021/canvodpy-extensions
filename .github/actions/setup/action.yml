name: "Setup uv"
description: "Install uv and sync workspace dependencies"
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.10.3"
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install

    - name: Sync workspace
      shell: bash
      run: uv sync --all-extras --dev
