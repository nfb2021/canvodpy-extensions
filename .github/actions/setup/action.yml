name: "Setup uv"
description: "Install uv and sync workspace dependencies"
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.10.3"
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install

    - name: Sync workspace
      shell: bash
      run: uv sync --all-extras --dev
